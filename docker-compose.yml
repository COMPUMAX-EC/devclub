version: '3.8'
services:
  app:
    build: .
    image: devclub_app:latest
    container_name: devclub_app
    volumes:
      - ./:/var/www/html
    ports:
      - "9000:9000"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=devclub
      - DB_USERNAME=root
      - DB_PASSWORD=root
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: devclub_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devclub
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  nginx:
    image: nginx:stable
    container_name: devclub_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

  templates_service:
    build:
      context: ./services/templates_service
    image: devclub_templates:latest
    container_name: devclub_templates
    ports:
      - "8000:8000"
    volumes:
      - ./services/templates_service:/app
    environment:
      - DATABASE_URL=mysql+pymysql://root:root@mysql:3306/devclub
    depends_on:
      - mysql
      - redis

  redis:
    image: redis:7-alpine
    container_name: devclub_redis
    ports:
      - "6379:6379"

volumes:
  db_data:
